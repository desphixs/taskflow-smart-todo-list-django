<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Details — TaskFlow</title>
    <!-- Google Fonts link to import premium modern Outfit typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // We configure Tailwind to recognize 'Outfit' as our main font family registry
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-orange-50/30 font-sans text-slate-800 min-h-screen py-16 px-6 flex justify-center items-center">
    <div class="max-w-xl w-full">
        <!-- Main dynamic detail card container with soft glassmorphism shadows -->
        <div
            class="bg-white rounded-3xl p-8 shadow-xl shadow-orange-100/50 border border-slate-100/80 relative overflow-hidden">
            <!-- Top glowing gradient accent header strip -->
            <div
                class="absolute left-0 right-0 top-0 h-[6px] bg-gradient-to-r {% if task.is_completed %}from-orange-400 to-amber-500{% else %}from-amber-400 to-orange-400{% endif %}">
            </div>

            <!-- Detail Page Header Icon representing state -->
            <div class="flex justify-center mb-6">
                {% if task.is_completed %}
                <div
                    class="w-16 h-16 bg-orange-100 text-orange-600 rounded-2xl flex items-center justify-center text-2xl shadow-sm shadow-orange-100 animate-bounce">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                {% else %}
                <div
                    class="w-16 h-16 bg-amber-50 text-amber-500 rounded-2xl flex items-center justify-center text-2xl shadow-sm shadow-amber-100">
                    <i class="fa-regular fa-clock"></i>
                </div>
                {% endif %}
            </div>

            <!-- Task Main Contents -->
            <div class="text-center mb-8">
                <span class="text-xs uppercase font-semibold tracking-wider text-slate-400">Task Document #{{ task.id
                    }}</span>
                <h1 class="text-2xl font-bold text-slate-800 mt-2 mb-4 leading-normal px-4">
                    {{ task.title }}
                </h1>

                <!-- Separator line -->
                <div class="w-12 h-[2px] bg-orange-100 mx-auto my-4 rounded-full"></div>
            </div>

            <!-- Task Metadata Grid Deck -->
            <div class="grid grid-cols-2 gap-4 mb-8 bg-slate-50/50 rounded-2xl p-4 border border-slate-100/60">
                <!-- Status Row Field -->
                <div class="flex flex-col items-center justify-center p-3 text-center">
                    <span class="text-xs text-slate-400 font-light mb-1">Status State</span>
                    {% if task.is_completed %}
                    <span
                        class="bg-orange-100 text-orange-700 text-xs font-semibold px-4 py-1.5 rounded-full inline-flex items-center space-x-1.5 shadow-sm">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Completed</span>
                    </span>
                    {% else %}
                    <span
                        class="bg-amber-100 text-amber-800 text-xs font-semibold px-4 py-1.5 rounded-full inline-flex items-center space-x-1.5 shadow-sm">
                        <i class="fa-regular fa-clock"></i>
                        <span>Pending</span>
                    </span>
                    {% endif %}
                </div>

                <!-- Date Stamp Row Field -->
                <div class="flex flex-col items-center justify-center p-3 text-center border-l border-slate-200/50">
                    <span class="text-xs text-slate-400 font-light mb-1">Created Date</span>
                    <span class="text-slate-600 text-xs font-semibold inline-flex items-center space-x-1.5">
                        <i class="fa-regular fa-calendar-days text-orange-400"></i>
                        <span>{{ task.created_at|date:"M d, Y" }}</span>
                    </span>
                    <span class="text-[10px] text-slate-400 mt-0.5">{{ task.created_at|date:"H:i A" }}</span>
                </div>
            </div>

            <!-- Action buttons dashboard toolbar -->
            <div class="flex justify-center">
                <a href="{% url 'tasks:task_list' %}"
                    class="inline-flex items-center space-x-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-semibold px-6 py-3 rounded-2xl shadow-md shadow-orange-100 hover:shadow-lg transition-all duration-300 transform hover:-translate-y-0.5 text-sm">
                    <i class="fa-solid fa-arrow-left"></i>
                    <span>Back to Board</span>
                </a>
            </div>
        </div>
    </div>
</body>

</html>
