<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Smart To-Do List</title>
    <!-- Google Fonts link to import premium modern Outfit typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // We configure Tailwind to recognize 'Outfit' as our main font family registry
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-orange-50/30 font-sans text-slate-800 min-h-screen py-16 px-6 flex justify-center">
    <div class="max-w-2xl w-full">
        <!-- Main header for our TaskFlow workspace rocking warm orange vibes -->
        <header class="text-center mb-12">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-gradient-to-br from-orange-400 to-amber-500 rounded-2xl shadow-md shadow-orange-200 mb-4">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                </svg>
            </div>
            <h1 class="text-4xl font-bold mb-2 tracking-tight bg-gradient-to-r from-orange-500 to-amber-600 bg-clip-text text-transparent">
                TaskFlow
            </h1>
            <p class="text-slate-500 text-base font-light">
                Organize your daily goals seamlessly. Your smart task dashboard.
            </p>
        </header>

        <!-- Tasks list container holding our static placeholders -->
        <div class="space-y-4">
            <!-- First static task card: Completed state -->
            <div class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100/80 hover:shadow-md hover:border-orange-100 transition-all duration-300 flex items-center justify-between relative overflow-hidden">
                <!-- Left accent border stripe -->
                <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-gradient-to-b from-orange-400 to-amber-500"></div>
                
                <div class="flex items-center space-x-4 pl-2">
                    <!-- Custom styled status indicator -->
                    <div class="w-6 h-6 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center font-bold text-xs shadow-sm">
                        ✓
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800 leading-snug line-through text-slate-400">
                            Set up virtual environment and Django project
                        </h3>
                        <p class="text-xs text-slate-400 mt-0.5">Created just now</p>
                    </div>
                </div>
                
                <span class="bg-orange-50 text-orange-600 border border-orange-100 text-xs font-semibold px-3 py-1 rounded-full">
                    Completed
                </span>
            </div>

            <!-- Second static task card: Pending state -->
            <div class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100/80 hover:shadow-md hover:border-orange-100 transition-all duration-300 flex items-center justify-between relative overflow-hidden">
                <!-- Left accent border stripe -->
                <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-gradient-to-b from-amber-400 to-orange-400"></div>
                
                <div class="flex items-center space-x-4 pl-2">
                    <!-- Custom styled pending status indicator -->
                    <div class="w-6 h-6 border-2 border-orange-200 text-orange-600 rounded-full flex items-center justify-center font-bold text-xs">
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800 leading-snug group-hover:text-orange-600 transition-colors duration-200">
                            Build the tasks board view and templates
                        </h3>
                        <p class="text-xs text-slate-400 mt-0.5">Created today</p>
                    </div>
                </div>
                
                <span class="bg-amber-50 text-amber-700 border border-amber-100 text-xs font-semibold px-3 py-1 rounded-full">
                    Pending
                </span>
            </div>

            <!-- Third static task card: Completed state -->
            <div class="group bg-white rounded-2xl p-5 shadow-sm border border-slate-100/80 hover:shadow-md hover:border-orange-100 transition-all duration-300 flex items-center justify-between relative overflow-hidden">
                <!-- Left accent border stripe -->
                <div class="absolute left-0 top-0 bottom-0 w-[4px] bg-gradient-to-b from-orange-400 to-amber-500"></div>
                
                <div class="flex items-center space-x-4 pl-2">
                    <!-- Custom styled status indicator -->
                    <div class="w-6 h-6 bg-orange-100 text-orange-600 rounded-full flex items-center justify-center font-bold text-xs shadow-sm">
                        ✓
                    </div>
                    <div>
                        <h3 class="font-semibold text-slate-800 leading-snug line-through text-slate-400">
                            Design sticky note task grid mockup
                        </h3>
                        <p class="text-xs text-slate-400 mt-0.5">Created yesterday</p>
                    </div>
                </div>
                
                <span class="bg-orange-50 text-orange-600 border border-orange-100 text-xs font-semibold px-3 py-1 rounded-full">
                    Completed
                </span>
            </div>
        </div>
    </div>
</body>
</html>
